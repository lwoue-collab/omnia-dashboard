name: Weekly Omnia data refresh

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Omnia data
        env:
          OMNIA_API_KEY: ${{ secrets.OMNIA_API_KEY }}
          OMNIA_BASE_URL: https://app.useomnia.com
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: weekly Omnia data refresh $(date +%Y-%m-%d)"
          git push

      - name: Send weekly email
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python3 - <<'EOF'
          import json, smtplib, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import date

          # Load data
          with open("data.json") as f:
              d = json.load(f)

          weekly = d.get("weekly", [])
          latest = weekly[-1] if weekly else {}
          prev   = weekly[-2] if len(weekly) >= 2 else {}

          period   = latest.get("period", "—")
          ca       = latest.get("bofu_ca")
          prev_ca  = prev.get("bofu_ca")
          mofu     = latest.get("mofu")
          tofu     = latest.get("tofu")
          themes   = d.get("themes", [])
          status   = os.environ.get("JOB_STATUS", "success")

          ca_str   = f"{ca}%" if ca is not None else "—"
          mofu_str = f"{mofu}%" if mofu is not None else "Building baseline"
          tofu_str = f"{tofu}%" if tofu is not None else "Building baseline"

          if ca is not None and prev_ca is not None:
              diff = ca - prev_ca
              delta = f"+{diff}pp" if diff > 0 else f"{diff}pp" if diff < 0 else "flat"
              delta_color = "#0B6E31" if diff > 0 else "#C0392B" if diff < 0 else "#888"
          else:
              delta = "first data point"
              delta_color = "#888"

          status_icon = "✅" if status == "success" else "❌"

          # Theme rows
          theme_rows = ""
          for t in themes:
              bar_color = "#C0392B" if t["status"] == "gap" else "#0B6E31" if t["status"] == "leading" else "#E67E22"
              arrow = " ↓" if t["status"] == "gap" else ""
              theme_rows += f"""
              <tr>
                <td style="padding:6px 0;font-size:13px;color:#444;">{t['name']}</td>
                <td style="padding:6px 0;width:200px;">
                  <div style="background:#F0EFEC;border-radius:3px;height:6px;width:100%;">
                    <div style="background:{bar_color};width:{t['visibility']}%;height:6px;border-radius:3px;"></div>
                  </div>
                </td>
                <td style="padding:6px 0 6px 10px;font-size:13px;color:{bar_color};font-family:monospace;">{t['visibility']}%{arrow}</td>
              </tr>"""

          html = f"""
          <html><body style="margin:0;padding:0;background:#F7F6F3;font-family:'DM Sans',Arial,sans-serif;">
          <table width="100%" cellpadding="0" cellspacing="0" style="background:#F7F6F3;padding:32px 0;">
            <tr><td align="center">
              <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #E8E7E3;">

                <!-- Header -->
                <tr><td style="background:#141414;padding:24px 32px;">
                  <p style="margin:0;font-size:11px;color:#C0392B;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;">Red Points</p>
                  <h1 style="margin:4px 0 0;font-size:20px;font-weight:400;color:#ffffff;">AI Visibility — {period}</h1>
                </td></tr>

                <!-- Status bar -->
                <tr><td style="background:#F7F6F3;padding:10px 32px;border-bottom:1px solid #E8E7E3;">
                  <p style="margin:0;font-size:12px;color:#888;">{status_icon} Weekly data refresh {status} · {date.today().strftime('%d %b %Y')}</p>
                </td></tr>

                <!-- KPIs -->
                <tr><td style="padding:28px 32px 0;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td width="33%" style="vertical-align:top;padding-right:12px;">
                        <div style="background:#F7F6F3;border-radius:10px;padding:16px;">
                          <p style="margin:0 0 6px;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.05em;">BOFU category-aware</p>
                          <p style="margin:0;font-size:28px;font-weight:300;color:#1A237E;">{ca_str}</p>
                          <p style="margin:6px 0 0;font-size:12px;color:{delta_color};">{delta} vs last week</p>
                        </div>
                      </td>
                      <td width="33%" style="vertical-align:top;padding-right:12px;">
                        <div style="background:#F7F6F3;border-radius:10px;padding:16px;">
                          <p style="margin:0 0 6px;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.05em;">MOFU mention rate</p>
                          <p style="margin:0;font-size:28px;font-weight:300;color:#085041;">{mofu_str}</p>
                          <p style="margin:6px 0 0;font-size:12px;color:#999;">New prompts — ~2 weeks</p>
                        </div>
                      </td>
                      <td width="33%" style="vertical-align:top;">
                        <div style="background:#F7F6F3;border-radius:10px;padding:16px;">
                          <p style="margin:0 0 6px;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.05em;">TOFU mention rate</p>
                          <p style="margin:0;font-size:28px;font-weight:300;color:#7B3F00;">{tofu_str}</p>
                          <p style="margin:6px 0 0;font-size:12px;color:#999;">New prompts — ~2 weeks</p>
                        </div>
                      </td>
                    </tr>
                  </table>
                </td></tr>

                <!-- Theme breakdown -->
                <tr><td style="padding:24px 32px 0;">
                  <p style="margin:0 0 12px;font-size:11px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.06em;">Visibility by content theme</p>
                  <table width="100%" cellpadding="0" cellspacing="0">
                    {theme_rows}
                  </table>
                </td></tr>

                <!-- CTA -->
                <tr><td style="padding:28px 32px 32px;">
                  <a href="https://lwoue-collab.github.io/omnia-dashboard/"
                     style="display:inline-block;background:#141414;color:#ffffff;text-decoration:none;padding:12px 24px;border-radius:8px;font-size:13px;font-weight:500;">
                    View full dashboard →
                  </a>
                </td></tr>

                <!-- Footer -->
                <tr><td style="background:#F7F6F3;padding:16px 32px;border-top:1px solid #E8E7E3;">
                  <p style="margin:0;font-size:11px;color:#BBB;">Sent automatically every Monday · Red Points AI Visibility Dashboard · <a href="https://github.com/lwoue-collab/omnia-dashboard/actions" style="color:#BBB;">View workflow logs</a></p>
                </td></tr>

              </table>
            </td></tr>
          </table>
          </body></html>
          """

          # Send
          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"AI Visibility — {period} · BOFU {ca_str}"
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = os.environ["RECIPIENT_EMAILS"]
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.sendmail(
                  os.environ["GMAIL_USER"],
                  [e.strip() for e in os.environ["RECIPIENT_EMAILS"].split(",")],
                  msg.as_string()
              )
          print("Email sent successfully")
          EOF
